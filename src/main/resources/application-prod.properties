#DB Config
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

#Flyway Config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#Api token
api.security.token.secret=${JWT_SECRET}

#Desativa o retorno do tracktrace nas exceptions
server.error.include-stacktrace=never

#Spring config
logging.level.org.springframework.boot.autoconfigure=OFF

#AI Config
ai.openrouter.api-url=${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}
ai.openrouter.api-key=${OPENROUTER_API_KEY}
